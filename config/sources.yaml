project:
  name: "生鲜电商竞品动态追踪与价格舆情分析系统"
  scenario: "fresh_ecommerce"
  description: "面向盒马、叮咚买菜、美团买菜、朴朴超市等平台，监控肉蛋奶、基础蔬菜、水果等生鲜商品的价格波动、促销变化、新品上架和负面舆情。"

competitors:
  - name: "盒马"
    keywords: ["盒马", "盒马鲜生", "盒马生鲜", "盒马价格", "盒马促销"]
  - name: "叮咚买菜"
    keywords: ["叮咚买菜", "叮咚", "叮咚生鲜", "叮咚买菜价格"]
  - name: "美团买菜"
    keywords: ["美团买菜", "美团生鲜", "美团优选", "美团买菜价格"]
  - name: "朴朴超市"
    keywords: ["朴朴超市", "朴朴", "朴朴生鲜", "朴朴价格"]
  - name: "京东七鲜"
    keywords: ["京东七鲜", "七鲜", "7FRESH", "京东生鲜"]
  - name: "永辉生活"
    keywords: ["永辉生活", "永辉超市", "永辉生鲜"]
  - name: "山姆会员店"
    keywords: ["山姆", "山姆会员店", "山姆生鲜"]
  - name: "京东生鲜"
    keywords: ["京东生鲜", "京东买菜", "京东超市生鲜"]

product_categories:
  meat:
    name: "肉类"
    keywords: ["猪肉", "牛肉", "鸡肉", "五花肉", "排骨", "鸡胸肉"]
  egg:
    name: "蛋类"
    keywords: ["鸡蛋", "土鸡蛋", "鲜鸡蛋", "鸡蛋价格"]
  dairy:
    name: "奶类"
    keywords: ["鲜牛奶", "纯牛奶", "酸奶", "低温奶", "牛奶价格"]
  vegetable:
    name: "基础蔬菜"
    keywords: ["白菜", "土豆", "番茄", "西红柿", "黄瓜", "青菜", "菠菜", "胡萝卜", "洋葱"]
  fruit:
    name: "水果"
    keywords: ["苹果", "香蕉", "橙子", "草莓", "葡萄", "水果价格"]
  aquatic:
    name: "水产"
    keywords: ["虾", "鱼", "带鱼", "鲈鱼", "水产"]
  prepared_food:
    name: "预制菜"
    keywords: ["预制菜", "冷冻水饺", "半成品菜", "即食套餐"]

sources:
  - id: agri_price_public
    type: html
    name: "全国农产品批发市场价格信息"
    url: "https://pfsc.agri.cn/"
    dimension: "price"
    enabled: true
  - id: mofcom_food_price
    type: html
    name: "商务部食用农产品价格信息"
    url: "https://cif.mofcom.gov.cn/"
    dimension: "price"
    enabled: true
  - id: jiemian_hema_price_war
    type: html
    name: "界面新闻盒马生鲜价格战公开报道"
    url: "https://www.jiemian.com/article/6918702.html"
    competitor: "盒马"
    dimension: "market"
    priority: 3
    frequency_minutes: 10080
    keywords: ["盒马", "生鲜", "价格战", "叮咚买菜", "京东7FRESH"]
    enabled: true
  - id: kr36_dingdong_fresh_supply
    type: html
    name: "36氪叮咚买菜生鲜供应链公开报道"
    url: "https://m.36kr.com/p/3310788097269506"
    competitor: "叮咚买菜"
    dimension: "market"
    priority: 4
    frequency_minutes: 10080
    keywords: ["叮咚买菜", "生鲜", "前置仓", "供应链", "履约"]
    enabled: true
  - id: jd_fresh_manual
    type: manual_csv
