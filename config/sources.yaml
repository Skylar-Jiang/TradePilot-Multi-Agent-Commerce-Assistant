project:
  name: "生鲜批发采购区域供应源竞品动态追踪与智能对标分析系统"
  scenario: "fresh_wholesale_procurement"
  description: "面向生鲜批发商、采购商和供应链人员，监控不同产区、批发市场和供应渠道提供的同类生鲜商品的价格波动、区域价差、供应动态、质量风险和监管舆情。"

competitors:
  - name: "山东寿光黄瓜"
    keywords: ["山东寿光黄瓜", "寿光黄瓜", "寿光产区", "黄瓜批发价", "黄瓜到货价"]
  - name: "河北黄瓜"
    keywords: ["河北黄瓜", "河北产区", "黄瓜行情", "黄瓜价差"]
  - name: "辽宁批发市场黄瓜"
    keywords: ["辽宁批发市场黄瓜", "辽宁黄瓜", "东北黄瓜", "批发市场黄瓜"]
  - name: "华北鸡蛋供应源"
    keywords: ["华北鸡蛋", "鸡蛋批发价", "鸡蛋到货价", "鸡蛋供应"]
  - name: "东北猪肉供应渠道"
    keywords: ["东北猪肉", "猪肉批发价", "猪肉供应", "冷链物流"]

product_categories:
  meat:
    name: "肉类"
    keywords: ["猪肉", "牛肉", "鸡肉", "白条猪", "猪肉批发价"]
  egg:
    name: "蛋类"
    keywords: ["鸡蛋", "鲜鸡蛋", "鸡蛋批发价", "鸡蛋到货价"]
  dairy:
    name: "奶类"
    keywords: ["鲜牛奶", "低温奶", "奶源供应", "乳品批发价"]
  vegetable:
    name: "基础蔬菜"
    keywords: ["白菜", "土豆", "番茄", "西红柿", "黄瓜", "青菜", "菠菜", "胡萝卜", "洋葱", "蔬菜批发价"]
  fruit:
    name: "水果"
    keywords: ["苹果", "香蕉", "橙子", "草莓", "葡萄", "水果批发价", "产季"]
  aquatic:
    name: "水产"
    keywords: ["虾", "鱼", "带鱼", "鲈鱼", "水产"]

sources:
  - id: agri_price_public
    type: html
    name: "全国农产品批发市场价格信息"
    url: "https://pfsc.agri.cn/"
    dimension: "price"
    enabled: true
  - id: mofcom_food_price
    type: html
    name: "商务部食用农产品价格信息"
    url: "https://cif.mofcom.gov.cn/"
    dimension: "price"
    enabled: true
  - id: shouguang_cucumber_manual
    type: manual_csv
    name: "山东寿光黄瓜批发价手工样例"
    file: "data/raw/shouguang_cucumber_manual.csv"
    dimension: "price"
    enabled: true
  - id: hebei_cucumber_manual
    type: manual_csv
    name: "河北黄瓜批发价手工样例"
    file: "data/raw/hebei_cucumber_manual.csv"
    dimension: "price"
    enabled: true
  - id: liaoning_market_cucumber_manual
    type: manual_csv
    name: "辽宁批发市场黄瓜手工样例"
    file: "data/raw/liaoning_market_cucumber_manual.csv"
    dimension: "price"
    enabled: true
  - id: wholesale_supply_update_manual
    type: manual_csv
    name: "新产季与供应动态手工样例"
    file: "data/raw/wholesale_supply_update_manual.csv"
    dimension: "market"
    enabled: true
  - id: wholesale_risk_manual
    type: manual_csv
    name: "质量监管与供应风险手工样例"
    file: "data/raw/wholesale_risk_manual.csv"
    dimension: "sentiment"
    enabled: true
  - id: wholesale_logistics_weather_manual
    type: manual_csv
    name: "天气物流影响手工样例"
    file: "data/raw/wholesale_logistics_weather_manual.csv"
    dimension: "market"
    enabled: true
